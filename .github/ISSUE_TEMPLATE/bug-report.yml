name: Bug report
description: 不具合を報告する
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: issue
    attributes:
      label: 発生したこと
      placeholder: 例: Google ログイン後にトップへ戻ってしまう
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      placeholder: |
        1. /trial を開く
        2. ログインする
        3. ...
  - type: dropdown
    id: device
    attributes:
      label: 端末
      options:
        - iPhone / Android
        - PC
        - 両方
  - type: textarea
    id: notes
    attributes:
      label: 補足
      placeholder: エラー文やスクリーンショットがあれば記載してください
