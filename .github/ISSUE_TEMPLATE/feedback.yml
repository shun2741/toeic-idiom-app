name: Beta feedback
description: ベータ版の使い勝手や改善点を送る
title: "[Feedback] "
labels:
  - feedback
body:
  - type: markdown
    attributes:
      value: |
        ベータ版へのフィードバックありがとうございます。短くても大丈夫です。
  - type: textarea
    id: summary
    attributes:
      label: ひとこと感想
      description: 全体としてどう感じたか
      placeholder: 例: スマホでは選択式が使いやすかったです
    validations:
      required: true
  - type: textarea
    id: friction
    attributes:
      label: 迷った点・使いづらかった点
      placeholder: 例: 学習設定の場所が少し分かりづらかったです
  - type: dropdown
    id: device
    attributes:
      label: 使った端末
      options:
        - iPhone / Android
        - PC
        - 両方
  - type: textarea
    id: request
    attributes:
      label: 追加してほしいこと
      placeholder: 例: 単語帳のように一覧で見たい
